site_name: pylightningfx
site_url: https://ykus4.github.io/pylightningfx
site_description: Python client for bitFlyer Lightning API
repo_url: https://github.com/ykus4/pylightningfx
repo_name: ykus4/pylightningfx

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - content.code.copy
    - navigation.sections

plugins:
  - search
  - i18n:
      docs_structure: suffix
      languages:
        - locale: en
          default: true
          name: English
          build: true
        - locale: ja
          name: 日本語
          build: true

nav:
  - Home: index.md
  - API Reference:
    - Public API: api/public.md
    - Private API: api/private.md

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - admonition
  - pymdownx.details

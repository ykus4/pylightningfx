site_name: bitflyerpy
site_url: https://ykus4.github.io/bitflyerpy
site_description: Python client for bitFlyer Lightning API
repo_url: https://github.com/ykus4/bitflyerpy
repo_name: ykus4/bitflyerpy

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - content.code.copy
    - navigation.sections

nav:
  - Home: index.md
  - API Reference:
    - Public API: api/public.md
    - Private API: api/private.md

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - admonition
  - pymdownx.details
